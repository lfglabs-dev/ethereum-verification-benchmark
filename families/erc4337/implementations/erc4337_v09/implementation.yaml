notes: >
  Implementation entry for the ERC-4337 EntryPoint v0.9 contract,
  benchmarking the two-loop handleOps invariant: execution at index i
  if and only if validation passed at index i. The model abstracts
  UserOperations to indices with boolean validation outcomes, gas
  accounting is elided, and the two-loop control flow structure is
  faithfully preserved.
