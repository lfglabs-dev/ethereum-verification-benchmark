name: check

on:
  repository_dispatch:
    types:
      - unlink-solidity-changed
      - unlink-zk-changed
      - benchmark-case-changed
  push:
    branches:
      - main
      - master
      - codex/**
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CACHE_BUCKET: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('ref-{0}', github.ref_name) }}
  MAIN_CACHE_BUCKET: ref-main
  USE_STICKY_DISKS: "true"

jobs:
  check:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      DOTENV_PRIVATE_KEY: ${{ secrets.DOTENV_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: ./.github/actions/setup-lean
        with:
          use-sticky-disks: ${{ env.USE_STICKY_DISKS }}
          cache-bucket: ${{ env.CACHE_BUCKET }}
          main-cache-bucket: ${{ env.MAIN_CACHE_BUCKET }}
          use-build-sticky-disk: "true"

      - name: Install dotenvx
        run: npm install -g @dotenvx/dotenvx@1.57.0

      - name: Run repo check
        run: ./scripts/check.sh
