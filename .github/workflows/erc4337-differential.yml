name: erc4337 differential

# Differential-test runner for the ERC-4337 EntryPoint v0.9 case. Compares
# the Verity-compiled EntryPointV09 against the original solc-compiled
# EntryPoint.sol on the scenarios in
# Benchmark/Cases/ERC4337/EntryPointInvariant/differential/EntryPointDifferential.t.sol.
#
# No `verity-cli` binary needed — the Verity compile driver is invoked
# directly via `lake env lean --run`, mirroring the unlink-monorepo pattern.

on:
  pull_request:
    paths:
      - 'Benchmark/Cases/ERC4337/EntryPointInvariant/**'
      - 'cases/erc4337/**'
      - '.github/workflows/erc4337-differential.yml'
  workflow_dispatch:

jobs:
  differential:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout benchmark
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install elan + lake
        run: |
          for attempt in 1 2 3 4 5; do
            if curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh &&
               sh elan-init.sh -y --default-toolchain none; then
              break
            fi
            if [ "$attempt" = 5 ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Install Foundry
        run: |
          curl -sSfL https://foundry.paradigm.xyz | bash
          FOUNDRYUP="$(find "$HOME" -type f -name foundryup -perm /111 | head -n 1)"
          if [ -z "$FOUNDRYUP" ]; then
            echo "::error foundryup was not installed"
            exit 1
          fi
          export PATH="$(dirname "$FOUNDRYUP"):$PATH"
          echo "$(dirname "$FOUNDRYUP")" >> "$GITHUB_PATH"
          for attempt in 1 2 3 4 5; do
            "$FOUNDRYUP" --install 1.6.0-rc1 || true
            if command -v forge >/dev/null 2>&1 && forge --version; then
              break
            fi
            if [ "$attempt" = 5 ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: Install solc 0.8.28
        run: |
          sudo curl -sL \
            https://github.com/ethereum/solidity/releases/download/v0.8.28/solc-static-linux \
            -o /usr/local/bin/solc
          sudo chmod +x /usr/local/bin/solc
          solc --version

      - name: Cache lake build
        uses: actions/cache@v4
        with:
          path: |
            .lake
          key: ${{ runner.os }}-erc4337-lake-${{ hashFiles('lake-manifest.json') }}

      - name: Build EntryPointV09 case
        run: |
          lake build Benchmark.Cases.ERC4337.EntryPointInvariant.EntryPointV09

      - name: Run differential harness
        run: |
          bash Benchmark/Cases/ERC4337/EntryPointInvariant/differential/run.sh
