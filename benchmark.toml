name = "verity-benchmark"
version = "0.1.0"
primary_unit = "group"
primary_track = "group/lean_tools"
build_command = "./scripts/run_all.sh"
task_command = "./scripts/run_task.sh <project/case_id/task_id>"
group_list_command = "python3 -m harness.cli list --suite active --unit group"
default_harness_group_command = "./scripts/run_default_harness_group.sh <project/case>"
default_harness_suite_command = "./scripts/run_default_harness_suite.sh"
grok_build_group_command = "./scripts/run_grok_build_group.sh <project/case>"
grok_build_suite_command = "./scripts/run_grok_build_suite.sh"
# Canonical group runs are written under results/runs/<timestamp>-<harness>-<group>.
default_harness_summary = "results/runs"
grok_build_summary = "results/runs"
inventory = "benchmark-inventory.json"
report = "REPORT.md"
manifest_glob = "cases/*/*/case.yaml"
task_manifest_glob = "cases/*/*/tasks/*.yaml"
backlog_glob = "backlog/*/*/case.yaml"
backlog_task_glob = "backlog/*/*/tasks/*.yaml"
result_schema = "schemas/run-result.schema.json"
active_cases = [
  "alchemix/earmark_conservation",
  "balancer/reclamm_swap_rounding",
  "cork/pool_solvency",
  "damn_vulnerable_defi/side_entrance",
