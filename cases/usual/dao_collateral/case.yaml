  - successful_call_preconditions
notes: >
  Usual USD0 DaoCollateral conservation case. It verifies that no direct
  swap/redeem transition can create unaccounted ghost USD0 supply or debit more
  ghost collateral than the contract's modeled accounting permits, modulo
  configured redeem fee, oracle price, CBR coefficient, token decimals, and
  floor rounding.
