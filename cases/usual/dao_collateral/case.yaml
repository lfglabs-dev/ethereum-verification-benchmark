abstraction_notes: >
  The benchmark targets DaoCollateral direct swap/redeem conservation. Oracle
  price and token decimal scale are explicit inputs. The swap quote is computed
  inside the model as floor(collateralAmount * price / tokenUnit), rather than
  supplied as a free theorem parameter. The token unit is explicitly gated to
  Solidity's supported `10 ** decimals` values for collateral decimals `0..18`;
  larger decimal counts are outside this benchmark because Solidity's
  normalization takes a different division branch. ERC20 transfers and USD0
  mint/burn calls are represented by explicitly named ghost ledgers:
  `ghostTreasuryCollateral` and `ghostUsd0Supply`. This keeps the proof scoped
  to DaoCollateral accounting rather than USD0 or ERC20 token correctness. The
  direct swap path credits exactly the RWA amount to the ghost collateral ledger
  and mints exactly the computed oracle USD quote in the ghost supply ledger.
  Successful-call
  hypotheses expose Solidity checked-arithmetic boundaries, nonzero computed
  quote, uint128 swap amount bound, supported token unit, ghost collateral
  sufficiency, and configured redeem fee / CBR coefficient bounds. The redeem
  path burns the user amount in the ghost supply ledger, remints only the
  non-CBR fee there, and debits the exact ghost collateral amount computed from
  net burned USD0, oracle price, token decimals, CBR flag, and floor rounding.
  SwapperEngine, intent matching, permits, role checks, pause gates, events, and
  registry lookups are elided because they do not alter this conservation
  equation.
unsupported_feature_codes:
