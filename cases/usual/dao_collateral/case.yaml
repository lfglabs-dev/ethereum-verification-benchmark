abstraction_notes: >
  The benchmark targets DaoCollateral direct swap/redeem conservation. Oracle
  quotes and token decimal scale are explicit inputs. ERC20 transfers and USD0
  mint/burn calls are represented by the treasury collateral balance and a
  ghosted USD0 supply effect, keeping the proof scoped to DaoCollateral rather
  than USD0 token correctness. The direct swap path credits exactly the RWA
  amount and mints exactly the oracle USD quote; a separate theorem ties that
  quote to the explicit floor(collateralAmount * price / tokenUnit) formula
  when oracle parameters are supplied. Successful-call hypotheses expose
  Solidity checked-arithmetic boundaries, nonzero quote, uint128 swap amount
  bound, treasury collateral sufficiency, and configured redeem fee / CBR
  coefficient bounds. The redeem path burns the user amount, remints only the
  non-CBR fee, and debits the exact collateral amount computed from net burned
  USD0, oracle price, token decimals, CBR flag, and floor rounding. SwapperEngine,
  intent matching, permits, role checks, pause gates, events, and registry
  lookups are elided because they do not alter this conservation equation.
unsupported_feature_codes:
  - external_erc20_calls_ghosted
  - oracle_reads_parameterized
  - checked_uint256_overflow_preconditions
  - successful_call_preconditions
notes: >
  Usual USD0 DaoCollateral conservation case. It verifies that no direct
  swap/redeem transition can create unaccounted USD0 or debit more collateral
  than the contract's modeled accounting permits, modulo configured redeem fee,
  oracle price, CBR coefficient, token decimals, and floor rounding.
