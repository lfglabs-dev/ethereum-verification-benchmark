abstraction_notes: >
  The model isolates Pendle V2 PY tokenization supply accounting. It inlines the
  paired PT contract as trusted paired state, models single-receiver mintPY, and
  models redeemPY as a successful pre-expiry state transition. Mint-side checked
  arithmetic is represented with Verity checked helpers. Redeem-side source
  success conditions are theorem hypotheses: not expired, nonzero self address,
  sufficient PT/YT balances and supplies, uint248 fit, nonzero index, and no
  fixed-point multiplication overflow. The redeem model returns the source-close
  amountSyOut expression but elides the SY transfer, SY reserve update, and
  redeem-side PY-index storage write because they cannot mutate the PT/YT
  supplies or balances used by this case. Rewards, user interest accrual,
  transfer-hook side conditions, the `_pyIndexCurrent` uint128 narrowing
  precondition, events, allowances, reentrancy status, and external token
  transfer return behavior are outside this case because they do not directly
  mutate the observed PT/YT accounting state.
unsupported_feature_codes: []
notes: >
  Proves that successful mintPY and successful pre-expiry redeemPY preserve the
  equality of PT and YT total supplies when that pairing held before the call.
  Post-expiry redeem is intentionally excluded from the preservation theorem
  because Pendle burns PT but not YT after maturity.
