abstraction_notes: >
  The benchmark targets Polaris' own primary invariant: reserve ratio deviation
  is zero for both the current curve point and the floor point. The model keeps
  the state variables and state-changing function boundaries from
  BaseBondingCurve. `_getBalanceFromReserveRatio` is modeled through its outer
  arithmetic: `(A * pow(supply, B_PLUS_1) + DECIMAL_PRECISION - 1) / B_PLUS_1`.
  The remaining explicit boundary is only the PRB/ABDK fixed-point `pow`
  implementation, represented as a linked external library boundary; the helper
  multiplication and decimal-precision rounding division are no longer trusted
  as a unit or supplied through theorem hypotheses.
  Theorems establish the post-state reserve to
  curve match for the modeled storage transition.
unsupported_feature_codes:
  - fixed_point_exponentiation_abstracted
  - erc20_per_account_balances_omitted
notes: >
  Polaris' Foundry invariant asserts reserveRatioDeviation() == 0 and the same
  predicate for floorSupply/floorBalance. This case records the corresponding
  state-transition preservation property over the bonding curve accounting
  slice as Lean theorems with no custom axioms and no sorry/admit. The broad
  helper-output and raw-pow witness boundaries have been removed from the
  theorem statements: the proof now computes the helper's multiply and
  `(left + DECIMAL_PRECISION - 1) / B_PLUS_1` path around a linked external
  `curvePow` boundary. This benchmark still does not bit-prove PRB/ABDK pow.
  The generated task files remain open challenge entrypoints for agents; they
  do not contradict the reference proof.
