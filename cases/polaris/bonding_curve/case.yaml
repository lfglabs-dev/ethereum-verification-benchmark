abstraction_notes: >
  The benchmark targets Polaris' own primary invariant: reserve ratio deviation
  is zero for both the current curve point and the floor point. The model keeps
  the state variables and state-changing function boundaries from
  BaseBondingCurve. The fixed-point exponentiation and ceil division helper is
  represented as opaque curveBalance because the proof target is operation-level
  drift: each transition must write the reserve balance corresponding to the
  resulting supply, including fee minting, sell fee handling, and floor fee
  burns. Executable transitions receive the source helper result as an input,
  and proof hypotheses tie those inputs back to curveBalance.
unsupported_feature_codes:
  - fixed_point_exponentiation_abstracted
  - erc20_per_account_balances_omitted
notes: >
  Polaris' Foundry invariant asserts reserveRatioDeviation() == 0 and the same
  predicate for floorSupply/floorBalance. This case proves the corresponding
  state-transition preservation property over the bonding curve accounting
  slice.
