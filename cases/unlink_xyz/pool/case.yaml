abstraction_notes: >
  Verity model of `UnlinkPool` (Unlink privacy pool implementation). Protocol-
  specific cryptographic primitives (Poseidon, Permit2, Lazy-IMT, Groth16
  verifier router) are routed through assumed-status external boundaries with
  named axioms, per the `unlink-verity` package split documented in
  `docs/ROADMAP.md` "Unlink Audit Readiness". UUPS proxy semantics are modeled
  as the implementation contract itself (proxy storage rotation is host-level
  and tracked under verity#1420). The model uses every Solidity-feature-parity
  primitive that landed in verity through PRs #1782 (selfbalance), #1795
  (Unlink-audit helpers), #1810 (callWithValue ECM), and #1827 (BN254
  precompile ECMs + `keccak256_lit` literal sugar).

  Three public entry points are SCOPED but not yet TRANSLATED. The
  PARAMETER-SHAPE side of the blocker (struct-parameter projection from
  an ABI-dynamic root for single-word static leaves) shipped via
  verity#1832 / verity#1843 on top of verity#1841 and verity#1842, and the
  lakefile pin has been bumped past those PRs. An empirical pilot
  (`pilot/transfer-body-1832`, 2026-05-13) confirmed that the macro now
  accepts `Array Transaction` / `Array WithdrawalTransaction` parameters
  and reads single-word static leaves of their elements
  (`(arrayElement _ i).circuitId` / `.merkleRoot` / `.contextHash`), but
  cannot yet express the per-tx body. Three further macro capabilities
  are required, tracked under verity#1849:
    * G1 — `arrayLength` on a struct-element dynamic member
      (`txn.nullifierHashes.length`).
    * G2 — element indexing of struct-element dynamic members
      (`txn.nullifierHashes[k]`).
    * G3 — forwarding dynamic-array values to `tryExternalCall` / `emit` /
      `revertError` argument lists.
  Combined with verity#1824 (internal helpers with `Array` parameters
  cannot be lowered), these are the final Verity-core gates on
  `transfer`, `withdraw`, and `emergencyWithdraw`.

  Source confirmation (pinned commit 4bc46c1f): there is NO
  `UnlinkAdapter`, no `adapterDeposit`, no `adapterWithdraw` —
  `UnlinkAdapter` was deleted upstream in `d9c8948 chore(contracts):
  delete UnlinkAdapter + strip adapter surface (UE-425)` predating our
  pin. The umbrella verity#1760 references the older multi-relayer
  release that still carried the adapter surface. With the adapter
  removed, the case scope is `UnlinkPool` only.

  Spec modules ported from the local scratchpad:
    - `InternalLazyIMT.lean`: full LazyIMT spec (Z_0..Z_32 tower,
      `_init`, `_insert`, `_update`, `_root`, `_rootWithDepth`,
      `_levels`, `_merkleProofElements`). Pure Lean spec used by the
      pool's `_insertLeaves` path.
    - `State.lean`: `StateStorage` record + `_initializeState`,
      `_insertLeaves`, `_spend`, `_setVerifierRouter` helpers operating
      over the LazyIMT spine + nullifier set + verifier-router.

  `verity_contract UnlinkPool` ships in `Contract.lean` covering:
    - all admin / view / lifecycle functions: `constructor`,
      `initialize`, `addRelayer`, `removeRelayer`, `setVerifierRouter`,
      `transferOwnership`, `acceptOwnership`, `renounceOwnership`,
      `isRelayer`, `hashNote`, `_checkRelayer`.
    - `deposit` translation is gated by verity#1824 (Array-param helper
      lowering) — `_validateAndCollectDeposit` /
      `_transferWithBalanceCheck` / `_insertLeaves` can't be factored
      into internal helpers that accept `Array Note` / `Array Uint256`
      parameters until that ships.

  The blocked entry points have explicit `PENDING TRANSLATION` markers
  in `Contract.lean` referencing verity#1849 (G1/G2/G3) and verity#1824.
