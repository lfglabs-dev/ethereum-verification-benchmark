abstraction_notes: >
  Verity model of `UnlinkPool` (Unlink privacy pool implementation). Protocol-
  specific cryptographic primitives (Poseidon, Permit2, Lazy-IMT, Groth16
  verifier router) are routed through assumed-status external boundaries with
  named axioms, per the `unlink-verity` package split documented in
  `docs/ROADMAP.md` "Unlink Audit Readiness". UUPS proxy semantics are modeled
  as the implementation contract itself (proxy storage rotation is host-level
  and tracked under verity#1420). The model uses every Solidity-feature-parity
  primitive that landed in verity through PRs #1782 (selfbalance), #1795
  (Unlink-audit helpers), #1810 (callWithValue ECM), and #1827 (BN254
  precompile ECMs + `keccak256_lit` literal sugar).

  Three public entry points are SCOPED but not yet TRANSLATED because they
  receive `Transaction[] calldata` / `WithdrawalTransaction[] calldata` /
  `AdapterTransaction[] calldata` parameter shapes whose struct elements
  contain nested dynamic members (`uint256[] nullifierHashes`,
  `uint256[] newCommitments`, `Ciphertext[] ciphertexts`, `Call[] calls`).
  The Verity macro currently accepts dynamic struct arrays with static-tuple
  elements (CurveCut[] shape from termmax #1750/#1758) and decodes nested
  dynamic member leaf words via `Expr.arrayElementDynamicWord`, but rejects
  struct-parameter projection from an ABI-dynamic-root at
  `Verity/Macro/Translate.lean:1715`. This is the lead blocker recorded in
  umbrella issue verity#1760. Once that lands, `transfer`, `withdraw`, and
  `adapterWithdraw` can be filled in from the Solidity source 1:1.

  Until then the case ships:
    - all admin / view / lifecycle functions: `constructor`, `initialize`,
      `addRelayer`, `removeRelayer`, `setVerifierRouter`, `transferOwnership`,
      `acceptOwnership`, `renounceOwnership`, `isRelayer`, `hashNote`,
      `_checkRelayer`.
    - the parameterless-array entries: `deposit` and `adapterDeposit` take
      `Note[]` and `Ciphertext[]` arrays whose elements are static tuples of
      ABI words, which the macro already accepts.
  The blocked entry points have explicit `BLOCKED(#1760-nested-dynamic):`
  markers in `Contract.lean` and link back to verity#1760.
