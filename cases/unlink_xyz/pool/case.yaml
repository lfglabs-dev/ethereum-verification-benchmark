abstraction_notes: >
  Verity model of `UnlinkPool` (Unlink privacy pool implementation) plus the
  sibling `VerifierRouter` Groth16 circuit registry. Protocol-specific
  cryptographic primitives (Poseidon, Permit2, Lazy-IMT, Groth16 verifier
  contracts reached through the router) are routed through explicit external or
  opaque boundaries,
  per the `unlink-verity` package split documented in
  `docs/ROADMAP.md` "Unlink Audit Readiness". UUPS proxy semantics are modeled
  as the implementation contract itself (proxy storage rotation is host-level
  and tracked under verity#1420). The model uses every Solidity-feature-parity
  primitive that landed in verity through PRs #1782 (selfbalance), #1795
  (Unlink-audit helpers), #1810 (callWithValue ECM), and #1827 (BN254
  precompile ECMs + `keccak256_lit` literal sugar), plus #1870
  (memory-array helper lowering), #1871 (dynamic-array event sources), #1872
  (array values in executable emit calls), #1873 (projected static-struct
  event payloads), #1874 (multi-result ECM binding), and #1900 (internal
  helper fidelity, ERC-7201 storage namespaces, and mapping-struct support
  needed by this case).

  The public ZK entry points (`deposit`, `transfer`, `withdraw`, and
  `emergencyWithdraw`) now build against source-shaped array parameters.
  The transfer/withdraw paths use `Array Transaction` /
  `Array WithdrawalTransaction` parameters with dynamic struct-array member
  projections and projected dynamic-array forwarding to linked externals /
  internal helpers. They now use `_realCommitments` / `_realNullifiers`-shaped
  memory-array helpers, pass the resulting memory array into an
  `_insertLeaves`-shaped helper, and emit source-shaped dynamic array and
  withdrawal-note payloads. The deposit path validates static `Note[]`
  elements, computes the source-shaped deposit witness hash, routes the Permit2
  transfer through the linked external boundary, inserts leaves, and emits the
  source-shaped `Deposited` payload. Poseidon, Permit2, external Groth16
  verifier contracts, and
  host-level UUPS proxy behavior remain explicit modeling boundaries, not
  unsupported Verity translation features.
  `_executeWithdrawal(_transactions[i], bool)` is routed through an internal
  helper call. The deploy-time BN254 precompile probe in `initialize` is wired
  through the 0x06/0x07/0x08 precompile ECMs and the multi-result ECM binder.

  Source confirmation (pinned commit 4bc46c1f): there is NO
  `UnlinkAdapter`, no `adapterDeposit`, no `adapterWithdraw` -
  `UnlinkAdapter` was deleted upstream in `d9c8948 chore(contracts):
  delete UnlinkAdapter + strip adapter surface (UE-425)` predating our
  pin. The umbrella verity#1760 references the older multi-relayer
  release that still carried the adapter surface. With the adapter
  removed, the case scope is `UnlinkPool` plus `VerifierRouter`.

  The top-level inherited `StateStorage` / `LazyIMTData` storage structs are
  still represented by explicit namespaced fields at their source slots. This
  is the only intentional source-shape storage exclusion in the translated
  case and is tracked by verity#1758.

  Spec modules ported from the local scratchpad:
    - `InternalLazyIMT.lean`: full LazyIMT spec (Z_0..Z_32 tower,
      `_init`, `_insert`, `_update`, `_root`, `_rootWithDepth`,
      `_levels`, `_merkleProofElements`). Pure Lean spec used by the
      pool's `_insertLeaves` path.
    - `State.lean`: `StateStorage` record + `_initializeState`,
      `_insertLeaves`, `_spend`, `_setVerifierRouter` helpers operating
      over the LazyIMT spine + nullifier set + verifier-router.

  `verity_contract UnlinkPool` ships in `Contract.lean` covering:
    - all admin / view / lifecycle functions: `constructor`,
      `initialize`, `addRelayer`, `removeRelayer`, `setVerifierRouter`,
      `transferOwnership`, `acceptOwnership`, `renounceOwnership`,
      `isRelayer`, `nextLeafIndex`, `hashNote`, `_checkRelayer`.
    - `deposit`, `transfer`, `withdraw`, and `emergencyWithdraw` bodies are wired.
  `verity_contract VerifierRouter` ships in `VerifierRouter.lean` covering
  Ownable2Step state, circuit registration, circuit pause, circuit lookup, and
  verifier-to-circuit-id lookup with the Solidity `mapping(bytes32 => Circuit)`
  represented as `MappingStruct(Uint256, [...])`.
