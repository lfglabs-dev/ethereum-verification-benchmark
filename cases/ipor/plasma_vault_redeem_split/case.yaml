  - release_queue_elided
  - access_control_elided
notes: >
  This case is intentionally honest about the counterexample. It should not be
  published as a completed vulnerability proof. The useful FV result is the
  remaining-holder no-principal-dilution theorem once the Nat arithmetic proof is
  discharged.
