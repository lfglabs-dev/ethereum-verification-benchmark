abstraction_notes: >
  Focused arithmetic model of PlasmaVault redeem: fee shares are rounded down,
  all requested shares are burned, only net shares are converted to assets, and
  retained fee value remains in vault assets. The original split-payout bound is
  documented as false. The revised safety target is PPS non-decrease; the old
  split bound is available only under an explicit bounded-advantage assumption.
