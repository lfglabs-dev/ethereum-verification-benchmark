abstraction_notes: >
  Focused arithmetic model of PlasmaVault redeem: fee shares are rounded down,
  all requested shares are burned, only net shares are converted to assets, and
  retained fee value remains in vault assets. An earlier split-payout fairness
  target was rejected as too strong for these semantics. The completed proof
  target is virtualized conversion PPS non-decrease, plus a one-step fee-payout
  upper bound.
unsupported_feature_codes:
  - markets_elided_total_assets_ghosted
  - release_queue_elided
  - access_control_elided
notes: >
  This case is intentionally scoped to the safety property that remains true
  after the failed split-fairness target: a successful modeled redeem cannot
  decrease virtualized conversion PPS. It should be described as no decrease in
  the modeled ERC4626 redeemable-value ratio, not as a proof that fee-splitting
  is impossible or that the whole vault is bug-free.
