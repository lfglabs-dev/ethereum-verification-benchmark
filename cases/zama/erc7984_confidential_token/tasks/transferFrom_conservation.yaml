abstraction_notes: >
  Operator-gated transferFrom preserves the sum balances[holder] +
  balances[recipient]. The operator expiry is read from the nested mapping
  _operators[holder][msg.sender] using getMapping2. Authorization is
  granted if holder == msg.sender or block.timestamp <= expiry (passed as
  a parameter since Verity's verity_contract DSL does not expose
  blockTimestamp as a bind source).
