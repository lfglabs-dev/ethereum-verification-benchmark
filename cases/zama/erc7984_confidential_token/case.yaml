abstraction_notes: >
  The benchmark models the core accounting logic of ERC-7984: transfer,
  transferFrom, setOperator, mint, and burn. FHE operations are modeled
  as plaintext equivalents justified by homomorphism (FHE.add → mod-2^64
  addition, FHE.select → if/then/else, FHESafeMath.tryDecrease/tryIncrease →
  helper-shaped conditional arithmetic including uninitialized-handle branches).
  The ACL system (FHE.allow/allowThis),
  cryptographic proof verification (fromExternal + inputProof), async
  disclosure/decryption via the off-chain gateway, and ERC1363-style
  receiver callbacks are omitted because they are outside this accounting
  slice; typed external calls and source-level internal helper factoring
  await Verity support.
  The nested operator mapping (address → address → uint48) is modeled
  faithfully using Verity's storageMap2 / getMapping2 / setMapping2.
  block.timestamp is passed as a parameter to transferFrom because the
  verity_contract DSL macro does not currently expose blockTimestamp as
  a bind source. FHE.isInitialized is modeled via separate boolean
  flags for balances and totalSupply. All arithmetic uses explicit mod
  2^64 to faithfully capture euint64 wrapping semantics. Function arguments
  are modeled as initialized euint64 handles, so FHESafeMath.tryDecrease's
  uninitialized-delta branch is outside this slice. The contract body keeps
  FHESafeMath arithmetic inline to avoid adding externally callable helper
  functions while Verity lacks source-level internal helpers; the specs expose
  the same logic through named helper definitions.
unsupported_feature_codes:
  - external_contract_call
  - off_chain_interaction
  - fhe_cryptographic_layer
notes: >
  ERC-7984 is the confidential fungible token standard co-developed by
  Zama and OpenZeppelin for the fhEVM. The key verification targets are
  balance conservation (no tokens created/destroyed by transfers),
  correctness of the FHE.select pattern (insufficient balance → silent
  0-transfer instead of revert), mint/burn accounting, overflow protection
  via FHESafeMath.tryIncrease, operator-gated transferFrom, functional
  correctness of setOperator, and the exact match between successful
  deposits and credited confidential tokens. Twelve proof tasks cover the
  5 modeled functions.
