abstraction_notes: >
  This benchmark proves the TermAuction assignment correctness property for a
  valid clearing point. It models bids and offers as abstract lists with
  sortedness kept as the real auction input-boundary hypothesis, although the
  assignment proof is order-insensitive once capacity is assumed. It treats
  `clearingPrice` and `maxAssignable` as clearing outputs satisfying eligible
  demand/supply capacity, and proves the assignment guarantee by induction over
  the residual sweeps. It does not prove the `_calculateClearingPrice` search
  loop or downstream repurchase-value rounding.
unsupported_feature_codes: []
notes: >
  Clearing assignment correctness for the weekly sealed-bid uniform-price double
  auction: positive bid assignments respect the clearing rate floor, positive
  offer assignments respect the clearing rate ceiling, and assigned
  purchase-token principal balances exactly across both sides.
