abstraction_notes: >
  This benchmark proves the TermAuction assignment correctness property for a
  valid clearing point. It models bids and offers as sorted abstract lists,
  treats `clearingPrice` and `maxAssignable` as clearing outputs satisfying
  eligible demand/supply capacity, and proves the assignment guarantee under a
  narrow residual-sweep axiom. It does not prove the `_calculateClearingPrice`
  search loop or downstream repurchase-value rounding.
unsupported_feature_codes:
  - residual_sweep_lemma_axiomatized
notes: >
  Clearing assignment correctness for the weekly sealed-bid uniform-price double
  auction: positive bid assignments respect the clearing rate floor, positive
  offer assignments respect the clearing rate ceiling, and assigned
  purchase-token principal balances exactly across both sides.
