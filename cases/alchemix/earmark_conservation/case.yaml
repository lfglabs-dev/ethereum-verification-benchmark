abstraction_notes: >
  The benchmark targets the lazy-projected earmark conservation invariant
  agreed with the Alchemix team (Ov3rkoalafied, 2026-04-24): the sum over
  active accounts of project(account, _earmarkWeight, _redemptionWeight,
  _survivalAccumulator).newEarmarked equals cumulativeEarmarked. Q128
  fixed-point operations are treated as exact (no floor-rounding drift)
  and the cross-epoch reconciliation branch of _computeUnrealizedAccount
  is folded into the same-epoch path. External calls (Transmuter.queryGraph,
  TokenUtils.safeBalanceOf, TokenUtils.safeTransfer) are modeled as opaque
  ghost reads / no-ops. Access control, NFT ownership, Initializable, and
  pause flags are elided. Account struct fields not on the earmark/debt
  path (collateralBalance, freeCollateral, lastCollateralWeight,
  lastMintBlock, lastRepayBlock, lastTotalRedeemed*, mintAllowances,
  allowancesVersion) are dropped. The set of active token IDs is passed
  as an explicit FiniteSet Uint256 because ContractState lacks a
  knownTokenIds ghost field for Uint256-keyed mappings.
unsupported_feature_codes:
  - q128_fixed_point_helpers
  - mapping_uint_keyset_tracking
notes: >
  Earmark conservation invariant for Alchemix V3 lazy-accrual debt
  accounting. The literal "sum of stored account.earmarked equals
  cumulativeEarmarked" is provably false on the deployed code (see
  AlchemistV3.sol:1014 comment "Global can lag local by rounding")
  because per-account earmarked is updated lazily inside _sync(tokenId).
  The lazy-projected version proven here is the property the design
  actually maintains and that downstream consumers (redemption math,
  collateral debit) rely on.
