abstraction_notes: >
  Proves that calling `earmark()` preserves the lazy-projected earmark
  conservation invariant. The increment to `cumulativeEarmarked`
  (`effectiveEarmarked`) must equal the sum, over active accounts, of
  the corresponding increment in each account's `projectedEarmarked`.
  This is a Finset.sum distribution lemma over Q128 multiplication.
