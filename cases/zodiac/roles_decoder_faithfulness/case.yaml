abstraction_notes: >
  The benchmark models the Roles v3 ABI decoder as a guarded byte-region walker.
  The reference decoder is an independent canonical Solidity ABI v2 layout
  model using HEAD/TAIL regions, block-relative offsets, length words, dynamic
  array element blocks, and ceil32-padded dynamic payloads. The reference
  solution proves the metadata bridge, recursive leaf-region faithfulness, and
  bounds-safety without case-specific axioms.
unsupported_feature_codes:
  - condition_packer_integrity_roundtrip_assumed
  - keccak_injectivity_for_hash_comparison_paths
notes: >
  This case targets the v3 decoder/callee mismatch class that required custom
  verifiers in Zodiac Roles v2. The theorem scope covers static values,
  dynamic bytes/string, tuples, dynamic arrays, nested AbiEncoded, and transparent
  logical wrappers. Operator.Custom, Zip, Slice, Pluck, MultiSendUnwrapper,
  comparison consumption, and external calls are intentionally out of scope.
