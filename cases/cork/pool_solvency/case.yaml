abstraction_notes: >
  The benchmark isolates the solvency-critical arithmetic of Cork Phoenix
  unwindExerciseOther. The model captures how cST shares released and net
  collateral added relate to the solvency invariant. Time-decay fee computation
  is factored out (net effect preserved). Decimal scale factors are parameterized
  rather than computed from exponentiation. Oracle rate is a storage parameter.
  Certora P-02 timed out on this function; this case fills that gap and proves
  solvency for arbitrary exchange rates and decimal combinations (Certora
  restricted to rate=1 or 3*1e18, decimals=17/16).
