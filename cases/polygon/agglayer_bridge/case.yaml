abstraction_notes: >
  The benchmark models the claim validation and nullifier path of AgglayerBridge.
  Dynamic metadata bytes are represented by a precomputed metadata hash, Merkle
  proof calculation is summarized by a deterministic root combiner, and token or
  message side effects after nullifier consumption are elided.
