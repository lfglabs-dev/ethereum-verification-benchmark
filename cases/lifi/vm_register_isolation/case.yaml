abstraction_notes: >
  Models LI.FI Composer VM register slots as masked register indices and
  register values as explicit byte-buffer ids. Ordinary call-like opcodes write
  only their masked destination register unless it is the void register 0x7A.
  CALLDATA_SURGERY mutates only bytes whose offsets are in the modeled surgery
  descriptor union on the buffer currently referenced by the masked source
  register, so aliases to that buffer intentionally observe the change.
  External calls, ERC20 transfers, command unpacking, and byte-level copy
  contents are abstracted because the benchmark targets successful-step frame
  isolation of VM registers and buffers.
unsupported_feature_codes:
  - external_calls_opaque
  - byte_values_abstracted
  - command_unpacking_elided
  - revert_paths_elided
notes: >
  Register isolation benchmark for LI.FI Composer's verified VirtualMachine
  source. The theorem set proves one-step successful-opcode frame preservation
  over the abstract buffer-id model for CALL, CALLDATA_BUILD, ABI_ENCODE,
  DEPOSIT_APPROVED, CALLDATA_SURGERY, and SAFE_TRANSFER, plus void-register
  reads, surgery byte locality, and void-source surgery.
