abstraction_notes: >
  The benchmark models LI.FI source-chain swap route atomicity for the original
  GenericSwapFacet / SwapperV2 / LibSwap path. Each SwapData item is decoded
  into a SwapStep with booleans for calldata shape, allow-list checks,
  approve-target checks including non-zero spender, contract existence,
  positive amount, required-deposit success, token balance/approval call success,
  and external-call success. The approve-needed flag means the non-native
  approval path runs; approve-allowed abstracts the conditional approve-only
  allow-list check and is true when approveTo equals callTo. RouteGuards model
  the public receiver and nonReentrant entry checks,
  pre/post swap balance reads, leftover refund phase, final receiver transfer,
  and refundExcessNative trailing transfer. A reverting LI.FI route is
  represented by Option.none, so no RouteCommit, final receiver transfer, or
  partial-success state is observable. The proof does not model third-party DEX
  internals or full EVM rollback machinery; it proves LI.FI's source-chain
  control-flow response to failed modeled steps, failed route gates, and the
  minimum-output gate. GenericSwapFacetV3 and periphery Executor loops are out
  of scope.
unsupported_feature_codes: []
notes: >
  This is an atomicity benchmark, not a price-quality or route-optimality
  benchmark. It proves that the modeled LI.FI route cannot commit a public final
  transfer unless every modeled public-route gate succeeds, every modeled route
  step succeeds, and the output amount meets the minimum.
