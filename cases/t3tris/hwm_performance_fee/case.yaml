abstraction_notes: >
  Focused arithmetic model of the T3tris period-fee computation and HWM
  persistence. The model preserves the source ordering where management fee
  shares inflate supply before the performance-fee PPS trigger, computes PnL
  against the cached HWM and old net supply, mints performance fee shares via
  the dilutive ceil formula, then persists the final post-fee PPS as the
  fee-accounted HWM. Management fee computation, oracle/silo valuation,
  external transfers, and async flow mechanics are abstracted out as explicit
  inputs because the target property is the multi-settlement no-double-charge
  behavior after gain, fee, loss, and recovery.
unsupported_feature_codes:
  - uint256_overflow_modeled_as_preconditions
  - management_fee_timestamp_formula_abstracted
  - oracle_and_silo_accounting_ghosted
  - memory_struct_mutation_functionalized
notes: >
  This case targets the coverage gap not present in Cyfrin's T3tris suite:
  structural HWM facts are already proved, but the multi-step economic property
  that recovery up to the fee-accounted HWM charges no second performance fee is
  not.
