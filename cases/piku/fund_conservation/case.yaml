abstraction_notes: >
  Piku's docs-matching Inverter implementation stores `_openRedemptionAmount`
  but does not store cumulative distributed backing, remaining backing, or
  protocol/project treasury fee counters. The model introduces those as ghost
  slots so the team-proposed fund-conservation invariant is state-readable.
  Oracle pricing and decimal conversion are represented by the already-computed
  redemption amount. Queue linked-list shape, roles, ERC20 transfer mechanics,
  blacklisting fallback, and event payloads are elided.
unsupported_feature_codes:
  - event_only_fee_accounting_requires_ghost_slot
  - external_oracle_pricing_abstracted
  - protocol_fee_recalculation_abstracted
  - ghost_solvency_precondition
notes: >
  Fund-conservation benchmark for Piku's oracle-priced queued redemption flow:
  distributed backing + queued redemption backing + remaining backing +
  protocol treasury fees + project treasury fees equals initial backing.
  Queue execution functions are source context; the modeled settlement
  transition is the successful `amountPaid` callback.
