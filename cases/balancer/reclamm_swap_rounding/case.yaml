abstraction_notes: >
  The benchmark targets the core ReClamm swap rounding invariant: for a
  successful exact-in or exact-out quote, with the current virtual balances
  fixed during the quote, applying the returned Vault-side real-balance deltas
  must not decrease (balanceA + virtualBalanceA) * (balanceB + virtualBalanceB).
  The model keeps the branch structure and rounding direction of
  computeOutGivenIn (floor) and computeInGivenOut (ceil via mulDivUp), while
  scalarizing the fixed two-token balances array and flattening PoolSwapParams.
  The virtual-balance refresh path is abstracted into explicit current virtual
  balance inputs because timestamp interpolation, sqrt, and powDown movement are
  separate from the rounding bug class targeted by this case. The onSwap model
  inlines the two ReClammMath helper bodies to avoid cross-contract/library-call
  macro surface while preserving the exact branch arithmetic.
unsupported_feature_codes:
  - memory_dynamic_array_scalarized
  - struct_memory_flattened
  - library_call_inlined
  - checked_uint256_overflow_preconditions
notes: >
  Certora I-01 identified that an intermediate floor division can undermine an
  intended rounding-up path. This case isolates the ReClamm arithmetic surface
  where that class of issue matters: exact-in swaps must not overpay output, and
  exact-out swaps must not undercharge input.
