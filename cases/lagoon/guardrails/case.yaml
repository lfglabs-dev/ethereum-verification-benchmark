abstraction_notes: >
  This benchmark models the pure arithmetic decision in GuardrailsLib.isCompliant
  for successful Solidity executions. Storage, events, activation status,
  updateGuardrails state mutation, and role checks are out of scope. The
  updateGuardrails int256-min rejection is captured as lowerRateNotMin. The
  successfulSolidityArithmeticScope predicate also requires nonzero divisors and
  branch-specific multiplication safety for Solidity 0.8 checked arithmetic.
