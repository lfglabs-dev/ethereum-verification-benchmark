abstraction_notes: >
  The benchmark models the two-loop structure of ERC-4337 handleOps as pure
  Lean functions. UserOperations are abstracted to indices with validation
  outcomes modeled as List Bool. The validation phase succeeds iff ALL results
  are true (reflecting the all-or-nothing revert semantics). The execution phase
  produces List.replicate n true (reflecting that every execution is attempted
  via try/catch). Gas accounting, paymaster logic, and account implementation
  details are abstracted away since they do not affect the core invariant. A
  Verity contract model (EntryPointModel) demonstrates the single-op case.
unsupported_feature_codes:
