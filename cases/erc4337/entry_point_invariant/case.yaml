notes: >
  ERC-4337 EntryPoint control-flow invariant slice: the operation execution
  path is reached if and only if validation passed. This is not a full proof of
  arbitrary account/paymaster EVM behavior or `innerHandleOp` calldata effects;
  it proves the selected two-loop model for all possible validation outcomes.
