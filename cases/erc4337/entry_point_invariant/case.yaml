abstraction_notes: >
  The benchmark models the two-loop structure of ERC-4337 handleOps as pure
  Lean functions. UserOperations are abstracted to indices with validation
  outcomes modeled as List Bool. The validation phase succeeds iff ALL results
  are true (reflecting the all-or-nothing revert semantics). The execution phase
  produces List.replicate n true (reflecting that `_executeUserOp` is reached
  once per operation after validation). The model records execution-path
  attempts, not account-call success, and elides callData payloads, gas
  accounting, paymaster internals, and account implementation details. A Verity
  contract model (EntryPointModel) demonstrates the native-loop/oracle-call
  shape and the single-op case.
