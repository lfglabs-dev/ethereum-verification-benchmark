  - ecm_runtime_target
  - try_catch_high_level
  - tuple_return
  - struct_parameters
spec_target: Benchmark.Cases.ERC4337.EntryPointInvariant.Specs
proof_target: Benchmark.Cases.ERC4337.EntryPointInvariant.Proofs
notes: >
  ERC-4337 EntryPoint core invariant: execution happens if and only if
  validation passed. This is the property that Certora spent over a year
  attempting to verify with SMT solvers but could not prove because SMT
  cannot universally quantify over arbitrary contract implementations.
  The Lean proof succeeds because it naturally handles universal quantification
  over all possible validation outcomes.
