  - struct_calldata_flattened
  - external_bridge_calls_as_preconditions
  - external_collateral_slash_call_as_witness
  - external_value_transfer_as_boolean
  - quote_hash_address_keyed
notes: >
  This case focuses on quote lifecycle conservation and single settlement for
  Rootstock Flyover / LBC peg-outs. The property proved here is not a Bitcoin
  proof verifier; it is the Rootstock-side accounting guarantee for the amount
  already registered by depositPegOut.
