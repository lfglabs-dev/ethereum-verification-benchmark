abstraction_notes: >
  The benchmark targets the compact peg-out quote lifecycle in PegOutContract:
  depositPegOut registers the Rootstock-side quote amount, refundPegOut settles
  it to the LP or fallback balance, and refundUserPegOut settles it to the user
  or fallback balance while recording the external collateral slash call amount
  as separate penalty accounting. Cryptographic quote validation, Bitcoin transaction
  parsing, and bridge confirmation checks are modeled as success preconditions
  because they gate the lifecycle but do not change the conserved Rootstock-side
  amount after a quote is accepted. Deposit overpayment refund behavior and the
  LP penalty timing predicate are modeled explicitly.
unsupported_feature_codes:
