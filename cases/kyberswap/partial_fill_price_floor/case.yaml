abstraction_notes: >
  This benchmark models the `_checkReturnAmount` enforcement helper from
  KyberSwap MetaAggregationRouterV2. It proves the partial-fill scaled
  price-floor guard over the values passed into the helper, with Solidity 0.8
  checked multiplication modeled through `mulPanic`. Public swap entrypoints,
  executor behavior, refunds, fee-on-destination accounting, route quality,
  ERC20 transfers, and true user balance deltas are intentionally out of scope.
unsupported_feature_codes: []
notes: >
  Helper-level proof only. The public paths compute `spentAmount` and
  `returnAmount` before calling `_checkReturnAmount`; this case proves the
  helper enforces the checked scaled inequality for successful partial-fill
  helper execution. Reading the guard as an effective-price floor additionally
  assumes `spentAmount <= amount`, which the helper does not enforce and the
  theorem does not assume.
