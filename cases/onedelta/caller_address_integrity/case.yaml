abstraction_notes: >
  The benchmark targets caller-address integrity for user-fund pulls in
  OneDeltaComposerEthereum. The model preserves the key function boundaries:
  deltaCompose captures msg.sender, BaseComposer-style dispatch passes an explicit
  callerAddress, transfer command ids select ERC20 or Permit2 transferFrom, and
  flash-loan and swap callbacks continue dispatch with the same callerAddress.
  It also covers the V3 callback calldataLength == 0 shortcut that directly
  pays a pool with ERC20 transferFrom(callerAddress, ...).
  Packed calldata offsets are abstracted into decoded command ids. External token
  calls are represented by event-log slots recording the from argument.
unsupported_feature_codes: []
notes: >
  This is a caller-identity benchmark, not an accounting benchmark. It proves
  that every modeled ERC20 and Permit2 fund-pull path uses the outer
  deltaCompose caller rather than an intermediate callback contract, the
  composer itself, or an embedded calldata address. The scope is transfer-command
  pulls plus the V3 callback direct-pull shortcut, not every transferFrom in the
  full composer source tree.
